trigger:
  branches:
    include:
      - main
  tags:
    include:
      - 'v*.*.0'

strategy:
  matrix:
    linux:
      imageName: 'ubuntu-latest'
    windows:
      imageName: 'windows-latest'

pool:
  vmImage: $(imageName)

variables:
  buildConfiguration: 'Release'
  isTag: $[startsWith(variables['Build.SourceBranch'], 'refs/tags/v')]

steps:
- checkout: self
  fetchDepth: 0
  fetchTags: true

- task: UseDotNet@2
  displayName: Installing .NET 10
  inputs:
    packageType: 'sdk'
    version: '10.x'
    installationPath: $(Agent.ToolsDirectory)/dotnet

- task: PowerShell@2
  displayName: Set Build Number
  inputs:
    targetType: 'inline'
    script: |
      $branch = "$(Build.SourceBranch)"
      if ($branch.StartsWith("refs/tags/v")) {
        $version = $branch -replace "refs/tags/v", ""
        $parts = $version.Split(".")
        $majorMinor = "$($parts[0]).$($parts[1])"
      } else {
        $tag = git describe --tags --abbrev=0 --match "v*" 2>$null
        if ($tag) {
          $prefix = $tag -replace "^v", ""
          $parts = $prefix.Split(".")
          $majorMinor = "$($parts[0]).$($parts[1])"
        } else {
          $majorMinor = "0.0"
        }
      }
      Write-Host "##vso[build.updatebuildnumber]$majorMinor.$(Build.BuildId)"

- task: DotNetCoreCLI@2
  displayName: Restoring Packages for Solution
  inputs:
    command: restore
    projects: '**/*.sln'

- script: 'echo -e "$(Build.BuildNumber)\n$(Build.BuildId)" > .buildinfo.json'
  condition: and(always(), eq(variables['imageName'], 'ubuntu-latest'))
  displayName: "Emit build number"
  workingDirectory: '$(Build.SourcesDirectory)/source/DasBlog.Web'
  failOnStderr: true
  
- task: DotNetCoreCLI@2
  displayName: Building Solution
  inputs:
    command: build
    projects: '**/*.sln'
    arguments: '--no-restore --configuration $(BuildConfiguration) -p:VersionPrefix=$(Build.BuildNumber) -p:FileVersion=$(Build.BuildNumber).0 -p:SourceRevisionId=$(Build.SourceVersion)'

- script: dotnet test source/DasBlog.Tests/UnitTests/ --logger trx;LogfileName=test_results.xml --results-directory $(System.DefaultWorkingDirectory)/test_results --filter Category=UnitTest
  displayName: Run Unit Tests on Windows
  condition: and(succeeded(), eq(variables['imageName'], 'windows-latest'))

- task: PublishTestResults@2
  displayName: Publish Test Results
  condition: and(always(), eq(variables['imageName'], 'windows-latest'))
  inputs:
    testRunner: VSTest
    testResultsFiles: '**/*.xml'
    searchFolder: '$(System.DefaultWorkingDirectory)/test_results'

- task: DotNetCoreCLI@2
  inputs:
    command: publish
    publishWebProjects: True
    zipAfterPublish: false
    modifyOutputPath: false
    arguments: '--configuration $(BuildConfiguration) --output $(Build.ArtifactStagingDirectory)/$(System.TeamProject)_$(Build.BuildNumber) '

- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: $(Build.ArtifactStagingDirectory)/$(System.TeamProject)_$(Build.BuildNumber)
    archiveType: 'zip'
    includeRootFolder: false
    archiveFile: '$(Build.ArtifactStagingDirectory)/$(System.TeamProject)_$(Build.BuildNumber).zip'
    replaceExistingArchive: true

- task: PublishPipelineArtifact@1
  condition: and(succeeded(), eq(variables['imageName'], 'windows-latest'))
  continueOnError: true
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)/$(System.TeamProject)_$(Build.BuildNumber).zip'
    artifactName: $(System.TeamProject)_$(Build.BuildNumber)

- task: DotNetCoreCLI@2
  displayName: Publish to template-staging
  condition: and(succeeded(), eq(variables['imageName'], 'windows-latest'), eq(variables.isTag, true))
  inputs:
    command: publish
    projects: 'source/DasBlog.Web/DasBlog.Web.csproj'
    arguments: '--configuration $(BuildConfiguration) --output source/template-staging'
    zipAfterPublish: false
    modifyOutputPath: false

- task: DotNetCoreCLI@2
  displayName: Pack NuGet template
  condition: and(succeeded(), eq(variables['imageName'], 'windows-latest'), eq(variables.isTag, true))
  inputs:
    command: custom
    custom: pack
    projects: 'source/DasBlog.Template.csproj'
    arguments: '-p:PackageVersion=$(Build.BuildNumber) --output $(Build.ArtifactStagingDirectory)/nupkg'

- task: NuGetCommand@2
  displayName: Push to NuGet.org
  condition: and(succeeded(), eq(variables['imageName'], 'windows-latest'), eq(variables.isTag, true))
  inputs:
    command: push
    packagesToPush: '$(Build.ArtifactStagingDirectory)/nupkg/*.nupkg'
    nuGetFeedType: external
    publishFeedCredentials: 'NuGetOrg'

- task: PublishPipelineArtifact@1
  displayName: Publish NuGet artifact
  condition: and(succeeded(), eq(variables['imageName'], 'windows-latest'), eq(variables.isTag, true))
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)/nupkg'
    artifactName: nuget

- task: GitHubRelease@1
  displayName: Create GitHub Release
  condition: and(succeeded(), eq(variables['imageName'], 'windows-latest'), eq(variables.isTag, true))
  inputs:
    gitHubConnection: 'poppastring'
    repositoryName: 'poppastring/dasblog-core'
    action: 'create'
    target: '$(Build.SourceVersion)'
    tagSource: 'userSpecifiedTag'
    tag: 'v$(Build.BuildNumber)'
    title: '$(Build.BuildNumber)'
    assets: '$(Build.ArtifactStagingDirectory)/$(System.TeamProject)_$(Build.BuildNumber).zip'
    isDraft: false
    isPreRelease: false
    changeLogCompareToRelease: 'lastFullRelease'
    changeLogType: 'commitBased'
